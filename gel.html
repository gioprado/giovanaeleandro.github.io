<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIDAN</title>

    <style>

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #000, #ff4b5c);
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
            overflow-x: hidden;
        }

        .center-image {
            width: 100%;
            max-width: 300px;
            height: auto;
            margin-bottom: 20px;
            border: 4px solid #fff;
            box-sizing: border-box;
        }

        .count-text {
            font-size: 24px;
        }

        .line {
            width: 350px;
            height: 2px;
            background-color: #fff;
            margin: 20px auto;
        }

        .menu {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 24px;
            cursor: pointer;
            color: #fff;
            z-index: 10;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 0;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            overflow-x: hidden;
            transition: 0.3s;
            padding-top: 60px;
        }

        .sidebar a {
            padding: 10px 15px;
            text-decoration: none;
            font-size: 14px;
            color: #fff;
            display: block;
        }

        .sidebar a:hover {
            background-color: #333;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
        }

        .page-title {
            color: #fff;
            font-size: 36px;
            font-family: "Stencil Std", fantasy;
            margin: 20px 0;
        }

        .frase {
            font-size: 18px;
            max-width: 400px;
            margin-bottom: 15px;
        }

        #contador {
    margin-top: 25px;
    font-size: 22px;
    background: rgba(0,0,0,0.5);
    display: inline-block;
    padding: 15px 25px;
    border-radius: 10px;
}

        /* corações */

        .heart {
            position: fixed;
            color: #ff4b5c;
            font-size: 20px;
            animation: float 6s linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh);
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh);
                opacity: 0;
            }
        }

    </style>
</head>
<body>

    <!-- menu -->
    <div class="menu" onclick="openMenu()">&#9776;</div>

    <div id="sidebar" class="sidebar">
        <span class="close-btn" onclick="closeMenu()">&times;</span>
        <a href="gel.html">Inicio</a>
        <a href="cartaaberta.html">Carta Aberta</a>
        <a href="Momentos.html">Musica que lembra você</a>
        <a href="10motivos.html">10 Coisas que Amo em Você</a>
        <a href="gidanflix.html">GIDANFLIX</a>
        <a href="jornal.html">GIDAN NEWS</a>
        <a href="cupons.html">CUPONS</a>
        <a href="thomas.html">THOMAS</a>
    </div>


    <h1 class="page-title">GIDAN ❤️</h1>

    <div class="frase">
        Nossa história começou em Nova York
    </div>

    <img src="ny.jpg" class="center-image">

    <div class="date-text">25 de agosto de 2024</div>

    <br>

    <div id="countTime" class="count-text"></div>

    <div class="line"></div>

    <div class="love-text">
        fiz esse site com muito carinho, 
        espero que goste!
    </div>


<script>

function openMenu() {
    document.getElementById("sidebar").style.width = "250px";
}

function closeMenu() {
    document.getElementById("sidebar").style.width = "0";
}


const startDate = new Date("2024-08-25T00:00:00");

function updateTime() {

    const now = new Date();

    const diff = now - startDate;

    const totalDays = Math.floor(diff / (1000 * 60 * 60 * 24));

    const years = Math.floor(totalDays / 365);

    const months = Math.floor((totalDays % 365) / 30);

    const days = Math.floor((totalDays % 365) % 30);

    document.getElementById("countTime").innerHTML =
        "Estamos juntos há ❤️<br>" +
        years + " anos, " +
        months + " meses e " +
        days + " dias";
}

setInterval(updateTime, 1000);

updateTime();


</script>

</body>
</html>
